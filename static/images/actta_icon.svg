<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">AcTTA icon</title>
  <desc id="desc">A shifted activation curve with an offset center marker, representing dynamic activation adaptation.</desc>

  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- transparent background -->
  <g filter="url(#softShadow)">
    <rect x="20" y="20" width="216" height="216" rx="44" fill="#ffffff"/>
  </g>

  <!-- axes -->
  <line x1="52" y1="136" x2="208" y2="136" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>
  <line x1="116" y1="52" x2="116" y2="204" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>

  <!-- original activation -->
  <path d="M48 146
           C72 146, 94 146, 110 145
           C118 144, 126 138, 132 130
           C144 112, 162 92, 206 48"
        fill="none" stroke="#94a3b8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!-- shift marker c -->
  <line x1="138" y1="86" x2="138" y2="184" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <circle cx="138" cy="136" r="8" fill="#f59e0b"/>

  <!-- adapted activation -->
  <path d="M46 154
           C74 154, 96 152, 118 148
           C130 146, 138 142, 144 134
           C154 120, 172 98, 210 44"
        fill="none" stroke="#2563eb" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- subtle slope cue -->
  <path d="M58 154 L88 151" stroke="#2563eb" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
</svg>
